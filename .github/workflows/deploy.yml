name: Build and deploy site

# Rebuilds on every push to main, so each daily scrape that weddle pushes
# republishes the site. The Python exporter runs WITHOUT an OpenAI key here: it
# regenerates the gitignored JSON from the repo and the committed embeddings
# cache (weddle does the embedding when it scrapes). No secrets needed.

on:
  push:
    branches: [main]
    # Skip rebuilds for pushes that can't change the built site. Everything else
    # — statements/, agencies.toml, the embeddings cache, the exporter, site/ —
    # still triggers a deploy. (paths-ignore skips only when EVERY changed file
    # matches, so a mixed commit still builds.) workflow_dispatch always runs.
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - "LICENSE"
      - ".gitignore"
      - "cron-scrape.sh"
      - "ops/**"
      - "backlog/**"
      - "test_*.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # the timeline IS the full git history

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.14"

      - name: Generate site data
        run: uv run --group export export

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1 # package.json lives in site/, not repo root, so set it here

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Set up Pages
        uses: actions/configure-pages@v6

      - name: Install site deps
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Lint
        run: pnpm run lint
        working-directory: site

      - name: Build
        run: pnpm run build
        working-directory: site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist
          include-hidden-files: true # keep .nojekyll

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
